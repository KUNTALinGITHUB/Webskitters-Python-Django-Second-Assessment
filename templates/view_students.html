{% extends 'base.html' %} {% block content %}
<div class="container mt-4 text-center">
  <h2>All Students</h2>

  <div>
    <br /><br />

    {% if students %}
    <div class="container mt-4">
      <table class="table table-dark">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Marks</th>
          </tr>
        </thead>

        {% for student in students %}
        <tbody>
        <tr>
          <td>{{ student.name }}</td>
          <td>{{ student.email }}</td>
          <td>{{ student.course }}</td>
          <td>{{ student.marks }}</td>
        </tr>
        </tbody>
        {% endfor %}
      </table>
    </div>
    {% else %}
    <p>No students found.</p>
    {% endif %} {% endblock %}
  </div>
</div>
